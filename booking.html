<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Studio Bony - Booking</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Beauty Studio Bony</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Начало</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Галерия</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="booking.html">Запази час</a>
                    </li>
                    <li class="nav-item" id="navProfileLink" style="display: none;">
                        <a class="nav-link" href="profile.html">Моят профил</a>
                    </li>
                    <li class="nav-item" id="navAdminLink" style="display: none;">
                        <a class="nav-link" href="admin.html">Админ панел</a>
                    </li>
                    <li class="nav-item">
                        <a id="navLoginLink" class="nav-link" href="login.html">Вход</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container mt-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-dark text-white rounded-top-4">
                        <h5 class="card-title mb-0">Запази час</h5>
                    </div>
                    <div class="card-body p-5">
                        <div id="bookingMessage"></div>
                        <div id="bookingWizard" class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
                            <div id="step1" class="wizard-step">
                                <h4 class="fw-bold mb-4 text-center">1. Избери специалист</h4>
                                <div class="row g-4 justify-content-center" id="wizardSpecialistsList">
                                    <div class="text-center text-muted">Зареждане на екипа...</div>
                                </div>
                            </div>

                            <div id="step2" class="wizard-step d-none">
                                <button type="button" class="btn btn-sm btn-light mb-4 rounded-pill px-3" onclick="goToStep(1)"><i class="bi bi-arrow-left"></i> Назад</button>
                                <h4 class="fw-bold mb-4 text-center">2. Избери услуга</h4>
                                <div class="row g-3 justify-content-center" id="wizardServicesList"></div>
                            </div>

                            <div id="step3" class="wizard-step d-none">
                                <button type="button" class="btn btn-sm btn-light mb-4 rounded-pill px-3" onclick="goToStep(2)"><i class="bi bi-arrow-left"></i> Назад</button>
                                <h4 class="fw-bold mb-4 text-center">3. Кога да те очакваме?</h4>
                                <div class="row g-4 justify-content-center">
                                    <div class="col-md-5">
                                        <label class="form-label text-muted small fw-bold">1. Избери дата</label>
                                        <input type="date" class="form-control form-control-lg rounded-4 bg-light border-0 shadow-sm" id="wizardDate">
                                    </div>
                                    <div class="col-md-7">
                                        <label class="form-label text-muted small fw-bold">2. Избери свободен час</label>
                                        <div id="timeSlotsContainer" class="d-flex flex-wrap gap-2">
                                            <div class="text-muted mt-2 small">Моля, изберете дата първо, за да видите часовете.</div>
                                        </div>
                                    </div>
                                    <div class="col-12 text-center mt-5">
                                        <button type="button" class="btn btn-dark btn-lg rounded-pill px-5 py-3 shadow" id="wizardSubmitBtn">Потвърди резервацията</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Session Management -->
    <script type="module" src="./src/js/services/session.js"></script>
    <!-- Booking Page Logic -->
    <script type="module" src="./src/js/pages/booking.js"></script>
</body>
</html>
