<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Studio Bony - Gallery</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- GLightbox CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .gallery-item {
            display: block;
            overflow: hidden;
            border-radius: 1rem;
        }
        .gallery-item img {
            transition: transform 0.5s ease, filter 0.5s ease;
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .gallery-item:hover img {
            transform: scale(1.08);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Beauty Studio Bony</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Начало</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="gallery.html">Галерия</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="booking.html">Запази час</a>
                    </li>
                    <li class="nav-item" id="navProfileLink" style="display: none;">
                        <a class="nav-link" href="profile.html">Моят профил</a>
                    </li>
                    <li class="nav-item" id="navAdminLink" style="display: none;">
                        <a class="nav-link" href="admin.html">Админ панел</a>
                    </li>
                    <li class="nav-item">
                        <a id="navLoginLink" class="nav-link" href="login.html">Вход</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container mt-4">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden mb-5">
            <div class="card-header bg-dark text-white p-4 p-md-5 text-center border-0">
                <h2 class="fw-bold mb-2">Наши работи</h2>
                <p class="text-white-50 mb-0 fs-5">Огледайте нашите най-нови създания в коса, нокти и грим гроююмен.</p>
            </div>
            <div class="card-body p-4 p-md-5 bg-light">
                <div class="row g-4" id="dynamicGalleryContainer"></div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- GLightbox JS -->
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <!-- Session Management -->
    <script type="module" src="./src/js/services/session.js"></script>
    <!-- Gallery Loader Script -->
    <script type="module">
        import { supabase } from './src/js/services/supabaseClient.js';

        /**
         * Load gallery items from Supabase and populate the gallery container
         */
        async function loadGalleryItems() {
            try {
                const { data, error } = await supabase
                    .from('gallery')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error fetching gallery:', error);
                    return;
                }

                const container = document.getElementById('dynamicGalleryContainer');
                if (!container) return;

                container.innerHTML = '';

                if (data && data.length > 0) {
                    data.forEach(item => {
                        const col = document.createElement('div');
                        col.className = 'col-md-6 col-lg-4';
                        col.innerHTML = `
                            <a href="${item.image_url}" class="glightbox gallery-item shadow-sm">
                                <img src="${item.image_url}" alt="${item.title || 'Portfolio Image'}" style="width: 100%; height: 300px; object-fit: cover; border-radius: 1rem; display: block;">
                            </a>
                        `;
                        container.appendChild(col);
                    });
                } else {
                    container.innerHTML = '<p class="text-muted text-center w-100">No gallery items available yet.</p>';
                }

                // Initialize or reinitialize GLightbox after DOM injection
                if (window.GLightbox) {
                    const lightbox = window.GLightbox({ selector: '.glightbox' });
                    if (lightbox) {
                        console.log('GLightbox initialized successfully');
                    }
                }
            } catch (error) {
                console.error('Unexpected error loading gallery:', error);
            }
        }

        // Load gallery items when DOM is ready
        document.addEventListener('DOMContentLoaded', loadGalleryItems);
    </script>
</body>
</html>
