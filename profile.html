<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Beauty Studio Bony</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Beauty Studio Bony</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="booking.html">Booking</a>
                    </li>
                    <li class="nav-item" id="navProfileLink" style="display: none;">
                        <a class="nav-link active" aria-current="page" href="profile.html">My Profile</a>
                    </li>
                    <li class="nav-item" id="navAdminLink" style="display: none;">
                        <a class="nav-link" href="admin.html">Admin Panel</a>
                    </li>
                    <li class="nav-item">
                        <a id="navLoginLink" class="nav-link" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 rounded-4 mb-5">
                    <div class="card-header">
                        <h2 class="card-title mb-0">My Profile</h2>
                    </div>
                    <div class="card-body p-4">
                        <form id="profileForm">
                            <div class="mb-3">
                                <label for="profileName" class="form-label">Full Name</label>
                                <input type="text" class="form-control form-control-lg" id="profileName" placeholder="Enter your full name" required>
                            </div>
                            <div class="mb-3">
                                <label for="profilePhone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control form-control-lg" id="profilePhone" placeholder="Enter your phone number" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill w-100 mt-3">Update Profile</button>
                        </form>
                        <div id="profileMessage" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- My Bookings Section -->
        <div class="row justify-content-center mt-4">
            <div class="col-md-10">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header">
                        <h2 class="card-title mb-0">My Bookings</h2>
                    </div>
                    <div class="card-body p-4">
                        <div id="bookingsMessage" class="mb-3"></div>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle" id="bookingsTable">
                                <thead>
                                    <tr>
                                        <th>Service</th>
                                        <th>Specialist</th>
                                        <th>Date & Time</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="bookingsTableBody">
                                    <!-- Bookings will be populated here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Edit Booking Modal -->
    <div class="modal fade" id="editBookingModal" tabindex="-1" aria-labelledby="editBookingModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title" id="editBookingModalLabel">Edit Booking</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editBookingForm">
                        <input type="hidden" id="editBookingId" value="">
                        <div class="mb-3">
                            <label for="editService" class="form-label">Service</label>
                            <select class="form-select form-select-lg" id="editService" required>
                                <option value="">Select a service</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="editSpecialist" class="form-label">Specialist</label>
                            <select class="form-select form-select-lg" id="editSpecialist" required>
                                <option value="">Select a specialist</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="editDateTime" class="form-label">Date & Time</label>
                            <input type="text" id="editDateTime" class="form-control form-control-lg bg-white" readonly required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="editBookingForm" class="btn btn-primary btn-lg rounded-pill">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <!-- Session Management -->
    <script type="module" src="./src/js/services/session.js"></script>
    <!-- Profile Page Script -->
    <script type="module" src="./src/js/pages/profile.js"></script>
</body>
</html>
